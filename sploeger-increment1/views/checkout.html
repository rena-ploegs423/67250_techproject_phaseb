<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Serena Ploeger">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>Checkout | MonoMuse</title>
</head>

<body> 

<!-- This page is a simple form for users to enter their name, email, and number of tickets they want to purchase. -->
<header>
    <h1>Checkout</h1>
    <nav>
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Tickets</a>
        <a href="checkout.html">Checkout</a>
    </nav>
</header>
  
<!-- The form below collects the user's name, email, and number of tickets they want to purchase. All fields are required. -->
<form>
    <p>
        <label for="name">Name: (required)</label>
    </p>
    <p>
        <input type="text" id="name" name="name" required>
    </p>
    <p>
        <label for="email">Email: (required)</label>
    </p>
    <p>
        <input type="email" id="email" name="email" required>
    </p>
    <p>
        <label for="quantity">Number of Tickets: (required)</label>
    </p>
    <p>
        <input type="number" id="quantity" name="quantity" required>
    </p>
    <p>
        <button type="submit">Submit</button>
    </p>
</form>

<footer>
    <p>© 2026 MonoMuse. All rights reserved.</p>
</footer>

</body>
</html>
